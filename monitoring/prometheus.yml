# Global configuration for Prometheus
global:
  scrape_interval: 15s     # How frequently to scrape targets by default
  evaluation_interval: 15s # How frequently to evaluate rules
  scrape_timeout: 10s      # Timeout for individual scrape requests

# Scrape configurations define the systems Prometheus monitors
scrape_configs:
  # 1. Self-monitoring: Prometheus scraping its own metrics
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # 2. FastAPI Monitoring: Scraping the Machine Learning API
  # This target uses 'host.docker.internal' to reach the application if it's 
  # running on the host machine while Prometheus is inside Docker.
  # If running both inside the same Docker Compose network, 'api:8000' is also an option.
  - job_name: "fastapi-monitoring"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000", "host.docker.internal:8000"]
    
    # Honor labels ensures that if the target app has its own labels, 
    # Prometheus won't overwrite them with its own 'job' or 'instance' labels.
    honor_labels: true

  # 3. Optional: Scrape metrics from other microservices if added later
  # - job_name: "model-training-service"
  #   static_configs:
  #     - targets: ["training-service:8001"]
