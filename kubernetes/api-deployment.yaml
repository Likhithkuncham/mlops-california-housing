apiVersion: apps/v1
kind: Deployment

metadata:
  name: fastapi-deployment
  namespace: mlops
  labels:
    app: fastapi

spec:
  replicas: 2

  selector:
    matchLabels:
      app: fastapi

  template:
    metadata:
      labels:
        app: fastapi

    spec:
      containers:
        - name: fastapi-container

          image: california-housing-api:latest

          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000

            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8000

            initialDelaySeconds: 15
            periodSeconds: 10

---
apiVersion: v1
kind: Service

metadata:
  name: api-service
  namespace: mlops

spec:
  selector:
    app: fastapi

  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000

  type: ClusterIP